<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#1e112e"/>
      <stop offset="100%" stop-color="#2d1b4e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <g transform="translate(400,225)">
    <!-- Brain / neural network -->
    <path d="M-80,-50 C-80,-80 -20,-90 0,-70 C20,-90 80,-80 80,-50 C100,-20 90,30 70,50 C50,70 30,80 0,60 C-30,80 -50,70 -70,50 C-90,30 -100,-20 -80,-50Z" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
    <!-- Neural nodes -->
    <circle cx="0" cy="-50" r="6" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="-60" cy="-20" r="4" fill="#a78bfa" opacity="0.6"/>
    <circle cx="60" cy="-20" r="4" fill="#a78bfa" opacity="0.6"/>
    <circle cx="-40" cy="40" r="4" fill="#c4b5fd" opacity="0.5"/>
    <circle cx="40" cy="40" r="4" fill="#c4b5fd" opacity="0.5"/>
    <circle cx="0" cy="50" r="4" fill="#c4b5fd" opacity="0.5"/>
    <!-- Connections -->
    <line x1="0" y1="-44" x2="-56" y2="-20" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="-44" x2="56" y2="-20" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
    <line x1="-56" y1="-16" x2="-36" y2="36" stroke="#a78bfa" stroke-width="0.6" opacity="0.4"/>
    <line x1="56" y1="-16" x2="36" y2="36" stroke="#a78bfa" stroke-width="0.6" opacity="0.4"/>
    <line x1="-36" y1="44" x2="0" y2="46" stroke="#c4b5fd" stroke-width="0.6" opacity="0.3"/>
    <line x1="36" y1="44" x2="0" y2="46" stroke="#c4b5fd" stroke-width="0.6" opacity="0.3"/>
    <line x1="-56" y1="-20" x2="56" y2="-20" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
    <!-- Pulse rings -->
    <circle cx="0" cy="-50" r="18" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3">
      <animate attributeName="r" from="10" to="30" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.5" to="0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- UI panel representations -->
    <rect x="-140" y="-110" width="30" height="8" rx="2" fill="#8b5cf6" opacity="0.3"/>
    <rect x="-140" y="-98" width="50" height="4" rx="1" fill="#a78bfa" opacity="0.2"/>
    <rect x="110" y="-110" width="30" height="8" rx="2" fill="#8b5cf6" opacity="0.3"/>
    <rect x="110" y="-98" width="50" height="4" rx="1" fill="#a78bfa" opacity="0.2"/>
    <!-- Bar indicators -->
    <rect x="-100" y="90" width="15" height="30" rx="2" fill="#8b5cf6" opacity="0.4"/>
    <rect x="-80" y="80" width="15" height="40" rx="2" fill="#a78bfa" opacity="0.3"/>
    <rect x="-60" y="85" width="15" height="35" rx="2" fill="#c4b5fd" opacity="0.3"/>
    <rect x="60" y="80" width="15" height="40" rx="2" fill="#8b5cf6" opacity="0.4"/>
    <rect x="80" y="90" width="15" height="30" rx="2" fill="#a78bfa" opacity="0.3"/>
    <rect x="100" y="85" width="15" height="35" rx="2" fill="#c4b5fd" opacity="0.3"/>
  </g>
  <!-- decorative dots -->
  <circle cx="80" cy="60" r="1.5" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="720" cy="80" r="2" fill="#a78bfa" opacity="0.2"/>
  <circle cx="150" cy="380" r="1.5" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="650" cy="370" r="2" fill="#a78bfa" opacity="0.2"/>
</svg>