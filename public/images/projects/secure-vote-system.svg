<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <g transform="translate(400,225)">
    <!-- Vote box -->
    <rect x="-80" y="-20" width="160" height="120" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2" opacity="0.9"/>
    <rect x="-65" y="-5" width="130" height="8" rx="4" fill="url(#accent)"/>
    <text x="0" y="25" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="24" font-weight="bold">VOTE</text>
    <!-- Slots -->
    <rect x="-55" y="40" width="40" height="6" rx="3" fill="#334155"/>
    <rect x="15" y="40" width="40" height="6" rx="3" fill="#334155"/>
    <rect x="-55" y="55" width="40" height="6" rx="3" fill="#334155"/>
    <rect x="15" y="55" width="40" height="6" rx="3" fill="#334155"/>
    <!-- Checkmark -->
    <circle cx="160" cy="-30" r="24" fill="#065f46" opacity="0.3"/>
    <path d="M150,-30 L158,-22 L172,-38" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Lock icon -->
    <rect x="155" y="70" width="14" height="12" rx="2" fill="#6366f1"/>
    <path d="M158,70 v-5 a4,4 0 0 1 8,0 v5" fill="none" stroke="#6366f1" stroke-width="2"/>
    <circle cx="162" cy="76" r="2" fill="#a5b4fc"/>
  </g>
  <!-- decorative dots -->
  <circle cx="100" cy="80" r="2" fill="#3b82f6" opacity="0.3"/>
  <circle cx="700" cy="100" r="3" fill="#3b82f6" opacity="0.2"/>
  <circle cx="120" cy="380" r="2" fill="#6366f1" opacity="0.3"/>
  <circle cx="680" cy="360" r="2" fill="#6366f1" opacity="0.2"/>
  <circle cx="50" cy="200" r="1.5" fill="#3b82f6" opacity="0.2"/>
  <circle cx="750" cy="250" r="2" fill="#6366f1" opacity="0.2"/>
</svg>