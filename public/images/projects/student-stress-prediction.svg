<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#1e112e"/>
      <stop offset="100%" stop-color="#2d1b4e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <g transform="translate(400,225)">
    <!-- Chart grid -->
    <line x1="-120" y1="60" x2="120" y2="60" stroke="#f59e0b" stroke-width="0.5" opacity="0.2"/>
    <line x1="-120" y1="30" x2="120" y2="30" stroke="#f59e0b" stroke-width="0.5" opacity="0.2"/>
    <line x1="-120" y1="0" x2="120" y2="0" stroke="#f59e0b" stroke-width="0.5" opacity="0.2"/>
    <line x1="-120" y1="-30" x2="120" y2="-30" stroke="#f59e0b" stroke-width="0.5" opacity="0.2"/>
    <line x1="-120" y1="-60" x2="120" y2="-60" stroke="#f59e0b" stroke-width="0.5" opacity="0.2"/>
    
    <!-- Axis -->
    <line x1="-120" y1="60" x2="-120" y2="-70" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
    <line x1="-120" y1="60" x2="120" y2="60" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
    
    <!-- Chart line - stress prediction -->
    <polyline points="-110,50 -80,35 -50,45 -20,15 10,30 40,-10 70,20 110,-5" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Data points -->
    <circle cx="-110" cy="50" r="3" fill="#fbbf24"/>
    <circle cx="-80" cy="35" r="3" fill="#fbbf24"/>
    <circle cx="-50" cy="45" r="3" fill="#fbbf24"/>
    <circle cx="-20" cy="15" r="3" fill="#fbbf24"/>
    <circle cx="10" cy="30" r="3" fill="#fbbf24"/>
    <circle cx="40" cy="-10" r="3" fill="#fbbf24"/>
    <circle cx="70" cy="20" r="3" fill="#fbbf24"/>
    <circle cx="110" cy="-5" r="3" fill="#fbbf24"/>
    
    <!-- Accuracy badge -->
    <rect x="70" y="-90" width="70" height="25" rx="12" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="105" y="-73" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">~85% ACC</text>
    
    <!-- Brain pulse -->
    <path d="M-180,70 Q-160,50 -140,70 Q-120,90 -100,70" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
    <path d="M100,70 Q120,50 140,70 Q160,90 180,70" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
    
    <!-- Model comparison bars -->
    <rect x="-100" y="80" width="20" height="8" rx="2" fill="#f59e0b" opacity="0.4"/>
    <rect x="-75" y="76" width="20" height="12" rx="2" fill="#fbbf24" opacity="0.3"/>
    <rect x="-50" y="72" width="20" height="16" rx="2" fill="#f59e0b" opacity="0.4"/>
    <rect x="-25" y="70" width="20" height="18" rx="2" fill="#fbbf24" opacity="0.3"/>
  </g>
  <!-- decorative dots -->
  <circle cx="100" cy="80" r="1.5" fill="#f59e0b" opacity="0.3"/>
  <circle cx="700" cy="100" r="2" fill="#fbbf24" opacity="0.2"/>
  <circle cx="120" cy="380" r="1.5" fill="#f59e0b" opacity="0.2"/>
  <circle cx="680" cy="370" r="2" fill="#fbbf24" opacity="0.2"/>
  <circle cx="60" cy="350" r="1" fill="#f59e0b" opacity="0.2"/>
  <circle cx="730" cy="300" r="1.5" fill="#fbbf24" opacity="0.2"/>
</svg>